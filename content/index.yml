seo:
  title: Nuxt Landing Template
  description: Boost your coding productivity with AI-driven insights that tell you when and how to code most efficiently.
title: Desarrollamos apps y sitio webs con pasion
description: Creamos aplicaciones y sitios web de alto rendimiento y calidad.
image: /lampara.png
hero:
  links:
    - label: Get started
      icon: i-lucide-arrow-right
      trailing: true
      color: primary
      to: https://ui.nuxt.com/docs/getting-started/installation/nuxt
      target: _blank
      size: xl
    - label: Clone on GitHub
      icon: i-simple-icons-github
      size: xl
      color: neutral
      variant: outline
      to: https://github.com/nuxt-ui-templates/landing
      target: _blank
section:
  title: "Tecnologías [modernas]{.text-primary} para resultados excepcionales"
  description: Dominamos el ecosistema de desarrollo web moderno. Desde frameworks frontend reactivos hasta backends robustos, usamos las herramientas líderes de la industria para construir aplicaciones escalables y de alto rendimiento.
  images:
    mobile: "/code.png"
    desktop: "/code.png"
  features:
    - title: Expertos en Vue & Nuxt
      description: Experiencias de usuario fluidas. Aprovechamos la potencia de Nuxt para crear aplicaciones web ultrarrápidas y optimizadas para SEO desde el primer día.
      icon: i-simple-icons-nuxtdotjs
      class: border-l border-default hover:border-primary pl-4 py-2 transition-colors
    - title: Python para Backend
      description: APIs modernas y procesamiento de datos eficiente. Usamos Python para construir infraestructuras seguras que crecen al ritmo de tu negocio.
      icon: i-simple-icons-python
      class: border-l border-default hover:border-primary pt-4 pl-4 py-2 transition-colors
    - title: Laravel para soluciones PHP
      description: Desarrollo ágil con el ecosistema más maduro del mercado. Ideal para entregar plataformas complejas y seguras en tiempos reducidos.
      icon: i-simple-icons-laravel
      class: border-l border-default hover:border-primary pt-4 pl-4 py-2 transition-colors
    - title: Astro para sitios estáticos
      description: Rendimiento extremo con arquitectura "Zero JavaScript". La elección perfecta para landing pages donde cada milisegundo de carga cuenta.
      icon: i-simple-icons-astro
      class: border-l border-default hover:border-primary pt-4 pl-4 py-2 transition-colors
ai:
  title: "Potencia tus aplicaciones con<br/>[Inteligencia Artificial]{.text-primary}"
  description: "Integramos IA en tus aplicaciones para automatizar tareas, optimizar procesos y generar insights valiosos. Transforma tu negocio con soluciones inteligentes que aprenden y se adaptan."
  features:
    - title: Automatización Inteligente
      description: Elimina tareas repetitivas con workflows automatizados impulsados por IA. Reduce costos operativos y libera a tu equipo para enfocarse en lo que realmente importa.
      icon: i-lucide-bot
    - title: Procesamiento de Datos
      description: Analiza grandes volúmenes de información en segundos. Extrae insights valiosos, detecta patrones y toma decisiones basadas en datos con precisión sorprendente.
      icon: i-lucide-brain-circuit
    - title: Reportes Personalizados
      description: Genera informes automáticos y personalizados adaptados a cada usuario. Visualiza métricas clave con dashboards interactivos que se actualizan en tiempo real.
      icon: i-lucide-file-bar-chart
    - title: Predicción y Análisis
      description: Anticípate a las tendencias con modelos predictivos. Predice comportamientos, demanda y riesgos para tomar decisiones proactivas y estratégicas.
      icon: i-lucide-trending-up
    - title: Asistentes Virtuales
      description: Implementa chatbots y asistentes inteligentes disponibles 24/7. Responde consultas, guía a usuarios y mejora la experiencia del cliente sin intervención humana.
      icon: i-lucide-message-square-more
    - title: Optimización Continua
      description: Tus aplicaciones mejoran automáticamente con el tiempo. La IA aprende del uso real, optimizando rendimiento y personalizando la experiencia.
      icon: i-lucide-sparkles
blog:
  title: "Últimos [artículos]{.text-primary} del blog"
  description: "Exploramos tendencias, compartimos conocimiento y documentamos nuestro camino en el desarrollo de software y la inteligencia artificial."
  articles:
    - title: "Cómo la IA está transformando el desarrollo web"
      description: "Descubrí cómo los modelos de lenguaje y las herramientas de IA están revolucionando la forma en que construimos aplicaciones modernas."
      date: "2025-12-15"
      category: "Inteligencia Artificial"
      icon: i-lucide-brain-circuit
      to: "#"
    - title: "Nuxt 4: todo lo que necesitás saber"
      description: "Un recorrido por las novedades de Nuxt 4, mejoras de rendimiento y cómo migrar tus proyectos existentes sin dolor."
      date: "2025-11-28"
      category: "Frontend"
      icon: i-simple-icons-nuxtdotjs
      to: "#"
    - title: "Automatización de procesos con Python y FastAPI"
      description: "Aprende a construir pipelines de automatización robustos que escalan con tu negocio usando Python y FastAPI."
      date: "2025-11-10"
      category: "Backend"
      icon: i-simple-icons-python
      to: "#"
pricing:
  title: Choose your [productivity]{.text-primary} path
  description: Unlock AI-powered coding efficiency with our flexible plans. Whether you're a solo developer or part of a team, we have the perfect toolset to maximize your development workflow.
  plans:
    - title: Pro Developer
      description: Perfect for individual developers focused on maximizing productivity.
      price: $199
      features:
        - AI productivity tracking to optimize your peak coding hours
        - Smart distraction alerts to maintain deep focus
        - Personal code snippet library for faster development
        - Deep Work Mode with Pomodoro timer integration
        - Performance analytics dashboard
        - Priority email support
      button:
        label: Buy now
        color: neutral
        variant: outline
        to: "#"
    - title: Team Developer
      description: For bootstrappers and indie hackers.
      price: $199
      features:
        - Everything in Pro Developer
        - Team productivity analytics and insights
        - Collaborative code snippet sharing
        - Cross-team performance tracking
        - Synchronized deep work sessions
        - Priority team support with dedicated manager
      button:
        label: Buy now
        variant: subtle
        to: "#"
testimonials:
  title: Join thousands of productive [developers]{.text-primary}
  description: See how developers are transforming their coding workflow and achieving more with our AI-powered platform.
  items:
    - quote: Since using this tool, my productivity has doubled. The AI insights helped me find my perfect coding rhythm and now I ship features twice as fast.
      user:
        name: "Sarah Moriceau"
        description: "Brand Designer"
        target: _blank
        avatar:
          src: "https://ipx.nuxt.com/f_auto,s_192x192/gh_avatar/SarahM19"
    - quote: Game-changer for our team. The focus tracking and smart alerts helped us reduce meeting interruptions by 40% and increased our sprint velocity.
      user:
        name: "Sébastien Chopin"
        description: "Lead Software Engineer"
        target: _blank
        avatar:
          src: "https://ipx.nuxt.com/f_auto,s_192x192/gh_avatar/atinux"
    - quote: Finally, a productivity tool that understands developers. The AI features helped me identify my peak coding hours and now I accomplish more in less time.
      user:
        name: "Benjamin Canac"
        description: "Senior Frontend Developer"
        target: _blank
        avatar:
          src: "https://ipx.nuxt.com/f_auto,s_192x192/gh_avatar/benjamincanac"
